<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC — Sender</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="sender.css" />
  </head>
  <body>
    <div class="sender-wrap">
      <h1>WebRTC <span class="tag">Sender</span></h1>

      <div id="statusBar" class="status disconnected">Connecting to server…</div>

      <div id="peerInfo" class="peer-info">Looking for a receiver…</div>

      <button id="startSensorsBtn" class="btn-controller" disabled>
        Start Controller Mode
      </button>

      <div id="sensorInfo" class="sensor-info">
        Gyroscope &amp; accelerometer streaming ✓
      </div>

      <div id="tapBtnWrap" class="tap-btn-wrap">
        <button id="tapBtn" class="tap-btn">TAP</button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"
      integrity="sha512-0f7Ahsuvr+/P2btTY4mZIw9Vl23lS6LY/Y7amdkmUg2dqsUF+cTe4QjWvj/NIBHJoGksOiqndKQuI9yzn2hB0g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script type="module">
      const $statusBar     = document.getElementById("statusBar");
      const $startBtn      = document.getElementById("startSensorsBtn");
      const $peerInfo      = document.getElementById("peerInfo");
      const $sensorInfo    = document.getElementById("sensorInfo");
      const $tapBtnWrap    = document.getElementById("tapBtnWrap");
      const $tapBtn        = document.getElementById("tapBtn");

      let socket, myStream, peer;
      let sensorsActive = false;

      const init = async () => {
        try {
          myStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: { width: 1280, height: 720, facingMode: "environment" },
          });
        } catch (e) {
          console.error("Could not access camera:", e);
          $statusBar.textContent = "Warning: camera access denied — no video will be sent.";
        }
        initSocket();
      };

      const initSocket = () => {
        socket = io.connect("/");

        socket.on("connect", () => {
          $statusBar.textContent = `Connected — My ID: ${socket.id}`;
          $statusBar.className = "status connected";
        });

        socket.on("disconnect", () => {
          $statusBar.textContent = "Disconnected from server";
          $statusBar.className = "status disconnected";
          setPeerInfo(null);
        });

        /* Auto-connect: pick the first available peer */
        socket.on("clients", (clients) => {
          const others = Object.keys(clients).filter((id) => id !== socket.id);
          if (others.length > 0 && !peer) {
            connectToPeer(others[0]);
          } else if (others.length === 0 && !peer) {
            setPeerInfo(null);
          }
        });

        socket.on("client-disconnect", (client) => {
          if (peer && peer.data && peer.data.id === client.id) {
            peer.destroy();
            peer = null;
            setPeerInfo(null);
            $startBtn.disabled = true;
            $startBtn.textContent = "Start Controller Mode";
            $startBtn.classList.remove("active");
            $sensorInfo.classList.remove("visible");
          }
        });

        socket.on("signal", (myId, signal, peerId) => {
          if (peer) {
            peer.signal(signal);
          } else if (signal.type === "offer") {
            createPeer(false, peerId);
            peer.signal(signal);
          }
        });
      };

      const connectToPeer = (peerId) => {
        $peerInfo.textContent = `Calling receiver…`;
        $peerInfo.className = "peer-info";
        createPeer(true, peerId);
      };

      const createPeer = (initiator, peerId) => {
        if (peer) { peer.destroy(); }
        peer = new SimplePeer({ initiator, stream: myStream });
        peer.data = { id: peerId };

        peer.on("signal", (data) => socket.emit("signal", peerId, data));

        peer.on("connect", () => {
          setPeerInfo(peerId);
          $startBtn.disabled = false;
        });

        peer.on("stream", () => {/* Sender doesn't render remote stream */});

        peer.on("close", () => {
          peer.destroy();
          peer = null;
          setPeerInfo(null);
          $startBtn.disabled = true;
          $startBtn.textContent = "Start Controller Mode";
          $startBtn.classList.remove("active");
          $sensorInfo.classList.remove("visible");
          $tapBtnWrap.classList.remove("visible");
          sensorsActive = false;
        });

        peer.on("error", (err) => console.error("Peer error:", err));
      };

      const setPeerInfo = (peerId) => {
        if (peerId) {
          $peerInfo.textContent = `Connected to receiver ✓`;
          $peerInfo.className = "peer-info connected";
        } else {
          $peerInfo.textContent = "Looking for a receiver…";
          $peerInfo.className = "peer-info";
        }
      };

      /* ── Controller / Sensor Button ── */
      $startBtn.addEventListener("click", async () => {
        if (sensorsActive) {
          sensorsActive = false;
          $startBtn.textContent = "Start Controller Mode";
          $startBtn.classList.remove("active");
          $sensorInfo.classList.remove("visible");
          $tapBtnWrap.classList.remove("visible");
          return;
        }
        await requestSensorPermission();
      });

      $tapBtn.addEventListener("click", () => {
        if (peer && peer.connected) {
          peer.send(JSON.stringify({ type: "button" }));
        }
      });

      const requestSensorPermission = async () => {
        try {
          if (
            typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function"
          ) {
            const p1 = await DeviceOrientationEvent.requestPermission();
            if (p1 !== "granted") return;
          }
          if (
            typeof DeviceMotionEvent !== "undefined" &&
            typeof DeviceMotionEvent.requestPermission === "function"
          ) {
            const p2 = await DeviceMotionEvent.requestPermission();
            if (p2 !== "granted") return;
          }
          activateSensors();
        } catch (e) {
          console.error("Sensor permission error:", e);
          activateSensors();
        }
      };

      const activateSensors = () => {
        sensorsActive = true;
        $startBtn.textContent = "Stop Controller Mode";
        $startBtn.classList.add("active");
        $sensorInfo.classList.add("visible");
        $tapBtnWrap.classList.add("visible");

        let lastAccel = { ax: 0, ay: 0, az: 0 };

        /* ── Gesture detection state ── */
        let lastGestureTime = 0;
        const COOLDOWN = 1500;

        const sendGesture = (gesture) => {
          const now = Date.now();
          if (now - lastGestureTime < COOLDOWN) return;
          lastGestureTime = now;
          if (peer && peer.connected) {
            peer.send(JSON.stringify({ type: "gesture", gesture }));
          }
        };

        /* ─── Shake ───
           Require 4+ direction reversals in X or Y within a 1.2 s window.
           A reversal = acceleration crosses zero with magnitude > 6 on each side. */
        let shakeReversals = 0;
        let shakeWindowStart = 0;
        let shakeLastSign = 0; // −1 or +1
        const SHAKE_THRESH = 6;
        const SHAKE_REVERSALS_NEEDED = 4;
        const SHAKE_WINDOW = 1200; // ms

        /* ─── Jump ───
           3-phase: push-off (Z accelIncGrav > 14) → freefall (Z < 3) → land (Z > 14)
           Must complete all 3 within 1.5 s. */
        let jumpPhase = "idle"; // idle → push → freefall → (land fires)
        let jumpStart = 0;
        const JUMP_TIMEOUT = 1500;

        /* ─── Duck ───
           Tilt phone face-down (beta > 60°) for at least 500 ms,
           then return upright (beta < 25°). Fires on the return. */
        let duckPhase = "idle"; // idle → tilted → (return fires)
        let duckTiltStart = 0;
        const DUCK_TILT_ANGLE = 60;
        const DUCK_HOLD_MS = 500;
        const DUCK_RETURN_ANGLE = 25;

        /* ─── 360 Spin ───
           Accumulate ≥ 350° of alpha rotation within a 3 s window.
           Must be mostly in ONE direction (net, not just absolute). */
        let spinAccum = 0;
        let lastAlpha = null;
        let spinStart = 0;
        const SPIN_WINDOW = 3000;
        const SPIN_THRESHOLD = 350;

        /* ── Device Motion (acceleration) ── */
        window.addEventListener("devicemotion", (event) => {
          if (!sensorsActive) return;

          const a = event.acceleration || event.accelerationIncludingGravity;
          if (a) {
            lastAccel = {
              ax: a.x?.toFixed(2) ?? 0,
              ay: a.y?.toFixed(2) ?? 0,
              az: a.z?.toFixed(2) ?? 0,
            };
          }

          /* ── Shake detection ── */
          const linAccel = event.acceleration;
          if (linAccel) {
            // Use whichever lateral axis has the biggest value
            const val = Math.abs(linAccel.x || 0) > Math.abs(linAccel.y || 0)
              ? (linAccel.x || 0) : (linAccel.y || 0);
            const sign = val > SHAKE_THRESH ? 1 : val < -SHAKE_THRESH ? -1 : 0;

            if (sign !== 0 && sign !== shakeLastSign) {
              const now = Date.now();
              if (shakeLastSign === 0 || now - shakeWindowStart > SHAKE_WINDOW) {
                // Start a new window
                shakeReversals = 1;
                shakeWindowStart = now;
              } else {
                shakeReversals++;
              }
              shakeLastSign = sign;

              if (shakeReversals >= SHAKE_REVERSALS_NEEDED) {
                sendGesture("shake");
                shakeReversals = 0;
                shakeLastSign = 0;
              }
            }
          }

          /* ── Jump detection (3-phase) ── */
          const aig = event.accelerationIncludingGravity;
          if (aig && aig.z !== null) {
            const az = Math.abs(aig.z);
            const now = Date.now();

            if (jumpPhase !== "idle" && now - jumpStart > JUMP_TIMEOUT) {
              jumpPhase = "idle"; // timed out
            }

            if (jumpPhase === "idle" && az > 14) {
              // Phase 1: push-off detected (legs push, phone goes up with high G)
              jumpPhase = "push";
              jumpStart = now;
            } else if (jumpPhase === "push" && az < 3) {
              // Phase 2: freefall at apex (near-weightless)
              jumpPhase = "freefall";
            } else if (jumpPhase === "freefall" && az > 14) {
              // Phase 3: landing impact
              jumpPhase = "idle";
              sendGesture("jump");
            }
          }
        });

        /* ── Device Orientation (gyro + duck + spin) ── */
        window.addEventListener("deviceorientation", (event) => {
          if (!sensorsActive || !(peer && peer.connected)) return;

          // Send raw telemetry
          peer.send(JSON.stringify({
            type: "gyro",
            alpha: event.alpha?.toFixed(1) ?? 0,
            beta:  event.beta?.toFixed(1)  ?? 0,
            gamma: event.gamma?.toFixed(1) ?? 0,
            ...lastAccel,
          }));

          /* ── Duck detection (tilt → hold → return) ── */
          const beta = event.beta ?? 0;
          if (duckPhase === "idle" && beta > DUCK_TILT_ANGLE) {
            duckPhase = "tilted";
            duckTiltStart = Date.now();
          } else if (duckPhase === "tilted") {
            if (beta <= DUCK_TILT_ANGLE) {
              duckPhase = "idle"; // released too early
            } else if (Date.now() - duckTiltStart >= DUCK_HOLD_MS) {
              duckPhase = "held"; // held long enough, wait for return
            }
          } else if (duckPhase === "held") {
            if (beta < DUCK_RETURN_ANGLE) {
              duckPhase = "idle";
              sendGesture("duck");
            }
          }

          /* ── 360 Spin (directional accumulation) ── */
          const alpha = event.alpha ?? 0;
          if (lastAlpha !== null) {
            let delta = alpha - lastAlpha;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;
            const now = Date.now();
            if (now - spinStart > SPIN_WINDOW) {
              spinAccum = 0;
              spinStart = now;
            }
            // Net accumulation preserves direction
            spinAccum += delta;
            if (Math.abs(spinAccum) >= SPIN_THRESHOLD) {
              sendGesture("spin");
              spinAccum = 0;
              spinStart = now;
            }
          }
          lastAlpha = alpha;
        });

        /* ── Speech detection (audio level) ── */
        if (myStream) {
          try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(myStream);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            const dataArr = new Uint8Array(analyser.frequencyBinCount);
            let speaking = false;

            const checkAudio = () => {
              if (!sensorsActive) return;
              analyser.getByteFrequencyData(dataArr);
              const avg = dataArr.reduce((a, b) => a + b, 0) / dataArr.length;
              if (avg > 25 && !speaking) {
                speaking = true;
                sendGesture("speech");
                setTimeout(() => { speaking = false; }, 2000);
              }
              requestAnimationFrame(checkAudio);
            };
            checkAudio();
          } catch (e) {
            console.error("Audio detection setup failed:", e);
          }
        }
      };

      init();
    </script>
  </body>
</html>
