<!doctype html>
<!--
  File: public/sender.html
  Role: Mobile controller UI for sensors, tap actions, game controls, and death-screen actions.
  Notes: Loaded on phone devices and driven by public/js/sender.js.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon Says - Controller</title>
    <link rel="icon" type="image/svg+xml" href="/media/favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="sender.css" />
  </head>
  <body>
    <div id="senderWrap" class="sender-wrap">
      <div class="sender-hero">
        <h1 class="sender-title">Simon Says</h1>
        <p class="sender-subtitle">Controller</p>
      </div>

      <div id="statusBar" class="status disconnected">Connecting to server…</div>

      <div id="peerInfo" class="peer-info">Looking for a receiver…</div>

      <div id="phoneCommandDisplay" class="phone-command-display hidden">
        <div id="phoneCommandPrefix" class="command-prefix"></div>
        <div id="phoneCommandText" class="command-action">Waiting…</div>
      </div>

      <button id="startSensorsBtn" class="btn-controller" disabled>
        Start Controller Mode
      </button>

      <button id="disconnectDeviceBtn" class="btn-controller btn-disconnect" disabled>
        Disconnect Device
      </button>

      <div id="sensorInfo" class="sensor-info">
        Sensors active — follow the screen!
      </div>

      <div id="tapBtnWrap" class="tap-btn-wrap">
        <div class="tap-grid" role="group" aria-label="Tap controls">
          <button class="tap-btn-color tap-green" data-color="green" aria-label="Green tap"></button>
          <button class="tap-btn-color tap-red" data-color="red" aria-label="Red tap"></button>
          <button class="tap-btn-color tap-yellow" data-color="yellow" aria-label="Yellow tap"></button>
          <button class="tap-btn-color tap-blue" data-color="blue" aria-label="Blue tap"></button>
        </div>
      </div>

      <div id="gameCtrlWrap" class="game-ctrl-wrap">
        <button id="startGameBtn" class="btn-game" disabled>Start Game</button>
        <button id="stopGameBtn" class="btn-game btn-game-stop" style="display:none">End Game</button>
      </div>

      <div id="deathActions" class="death-actions hidden">
        <div class="death-actions-score">Final Score: <span id="deathScoreValue">0</span></div>
        <label for="deathNameInput" class="death-actions-label">Scoreboard Name</label>
        <input
          id="deathNameInput"
          class="death-actions-input"
          type="text"
          maxlength="20"
          placeholder="Enter your name"
          autocomplete="name"
        />
        <button id="saveScoreBtn" class="btn-game btn-game-save" disabled>Save Score</button>
        <div id="saveScoreHint" class="death-actions-hint">Enter a name, then tap Save Score.</div>
        <button id="returnLobbyBtn" class="btn-game btn-game-return">Return to Lobby</button>
        <button id="playAgainBtn" class="btn-game btn-game-play-again">Play Again</button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"
      integrity="sha512-0f7Ahsuvr+/P2btTY4mZIw9Vl23lS6LY/Y7amdkmUg2dqsUF+cTe4QjWvj/NIBHJoGksOiqndKQuI9yzn2hB0g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script type="module" src="js/sender.js"></script>
  </body>
</html>
