<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC Webcam Share</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>WebRTC Webcam Share</h1>

      <div id="statusBar" class="status disconnected">Connecting...</div>

      <div class="qr-section">
        <h2>Scan this QR code with your phone to connect</h2>
        <div id="qrcode"></div>
        <p id="urlDisplay"></p>
      </div>

      <div class="controls">
        <label for="peerSelect">Peer:</label>
        <select id="peerSelect">
          <option value="none">--- Select Peer To Call ---</option>
        </select>
      </div>

      <div class="video-grid">
        <div class="video-box">
          <h2>My Camera</h2>
          <video id="myCamera" playsinline autoplay muted></video>
        </div>
        <div class="video-box">
          <h2>Other Camera</h2>
          <video id="otherCamera" playsinline autoplay></video>
        </div>
      </div>

      <div class="phone-data">
        <h2>Phone Data</h2>
        <ul>
          <li></li>
        </ul>
        <div id="mobileControls" style="text-align: center; padding: 20px">
          <button
            id="startSensorsBtn"
            style="
              padding: 15px;
              font-size: 1.2rem;
              background: #2ecc71;
              color: white;
              border: none;
              border-radius: 8px;
            "
          >
            Start Controller Mode
          </button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"
      integrity="sha512-0f7Ahsuvr+/P2btTY4mZIw9Vl23lS6LY/Y7amdkmUg2dqsUF+cTe4QjWvj/NIBHJoGksOiqndKQuI9yzn2hB0g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script type="module">
      const $myCamera = document.getElementById("myCamera");
      const $otherCamera = document.getElementById("otherCamera");
      const $peerSelect = document.getElementById("peerSelect");
      const $statusBar = document.getElementById("statusBar");
      const $phoneDataList = document.querySelector(".phone-data ul");
      const $mobileControls = document.getElementById("mobileControls");
      const $startSensorsBtn = document.getElementById("startSensorsBtn");

      let socket;
      let myStream;
      let peer;

      const generateQR = async () => {
        try {
          const res = await fetch("/api/ip");
          const data = await res.json();
          const url = data.url;
          document.getElementById("urlDisplay").textContent = url;
          new QRCode(document.getElementById("qrcode"), {
            text: url,
            width: 200,
            height: 200,
            colorDark: "#1a1a2e",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H,
          });
        } catch (e) {
          console.error("Could not generate QR code:", e);
          document.getElementById("urlDisplay").textContent =
            window.location.href;
        }
      };

      if (/Mobi|Android/i.test(navigator.userAgent)) {
        $mobileControls.style.display = "block";
      }

      const init = async () => {
        generateQR();
        initSocket();
        $peerSelect.addEventListener("input", callSelectedPeer);

        $startSensorsBtn.addEventListener("click", requestSensorPermission);

        try {
          const constraints = {
            audio: true,
            video: { width: 1280, height: 720, facingMode: "user" },
          };
          myStream = await navigator.mediaDevices.getUserMedia(constraints);
          $myCamera.srcObject = myStream;
        } catch (e) {
          console.error("Could not access webcam:", e);
          $statusBar.textContent =
            "Error: Could not access webcam. Make sure you allow camera permissions.";
          $statusBar.className = "status disconnected";
        }
      };

      const initSocket = () => {
        socket = io.connect("/");
        socket.on("connect", () => {
          console.log("Connected:", socket.id);
          $statusBar.textContent = `Connected — My ID: ${socket.id}`;
          $statusBar.className = "status connected";
        });
        socket.on("disconnect", () => {
          $statusBar.textContent = "Disconnected from server";
          $statusBar.className = "status disconnected";
        });
        socket.on("clients", updatePeerList);
        socket.on("client-disconnect", (client) => {
          if (peer && peer.data && peer.data.id === client.id) {
            peer.destroy();
            peer = null;
            $otherCamera.srcObject = null;
          }
        });
        socket.on("signal", async (myId, signal, peerId) => {
          console.log(`Received signal from ${peerId}`);
          if (peer) {
            peer.signal(signal);
          } else if (signal.type === "offer") {
            createPeer(false, peerId);
            peer.signal(signal);
          }
        });
      };

      const updatePeerList = (clients) => {
        $peerSelect.innerHTML =
          '<option value="none">--- Select Peer To Call ---</option>';
        for (const clientId in clients) {
          const isMyOwnId = clientId === socket.id;
          if (clients.hasOwnProperty(clientId) && !isMyOwnId) {
            const $option = document.createElement("option");
            $option.value = clientId;
            $option.textContent = clientId;
            $peerSelect.appendChild($option);
          }
        }

        const otherPeers = Object.keys(clients).filter(
          (id) => id !== socket.id,
        );
        if (otherPeers.length === 1 && !peer) {
          const params = new URLSearchParams(window.location.search);
          if (params.has("auto")) {
            $peerSelect.value = otherPeers[0];
            callSelectedPeer();
          }
        }
      };

      const callSelectedPeer = async () => {
        if ($peerSelect.value === "none") {
          if (peer) {
            peer.destroy();
            peer = null;
            $otherCamera.srcObject = null;
          }
          return;
        }
        console.log("Calling peer:", $peerSelect.value);
        createPeer(true, $peerSelect.value);
      };

      async function requestSensorPermission() {
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission === "granted") {
            setupSensorListeners();
          }
        } else {
          setupSensorListeners(); 
        }
      }

      function setupSensorListeners() {
        window.addEventListener("deviceorientation", (event) => {
          if (peer && peer.connected) {
            const data = {
              type: "gyro",
              alpha: event.alpha.toFixed(1),
              beta: event.beta.toFixed(1),
              gamma: event.gamma.toFixed(1),
            };
            peer.send(JSON.stringify(data));
          }
        });
      }

      const createPeer = (initiator, peerId) => {
        peer = new SimplePeer({ initiator, stream: myStream });
        peer.data = { id: peerId };

        peer.on("signal", (data) => {
          socket.emit("signal", peerId, data);
        });

        peer.on("data", (data) => {
          const message = JSON.parse(data);
          if (message.type === "gyro") {
            $phoneDataList.innerHTML = `
        <li><strong>Alpha (Z):</strong> ${message.alpha}°</li>
        <li><strong>Beta (X):</strong> ${message.beta}°</li>
        <li><strong>Gamma (Y):</strong> ${message.gamma}°</li>
      `;
          }
        });

        peer.on("stream", (stream) => {
          $otherCamera.srcObject = stream;
        });

        peer.on("close", () => {
          console.log("Peer connection closed");
          peer.destroy();
          peer = null;
          $otherCamera.srcObject = null;
        });

        peer.on("error", (err) => {
          console.log("Peer error:", err);
        });
      };

      $otherCamera.addEventListener("click", () => {
        $otherCamera.play();
      });

      init();
    </script>
  </body>
</html>
